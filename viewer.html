<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Equation Extractor</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$','$']], displayMath: [['$$','$$']] },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 24px 32px; }
    .header h1 { font-size: 1.5rem; font-weight: 600; }
    .header p { color: #94a3b8; font-size: 0.85rem; margin-top: 4px; }

    .input-bar { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 32px; display: flex; gap: 12px; align-items: center; }
    .input-bar input[type="text"] {
      flex: 1; background: #0f172a; color: #e2e8f0; border: 1px solid #475569;
      border-radius: 8px; padding: 10px 16px; font-size: 0.95rem; outline: none;
    }
    .input-bar input:focus { border-color: #3b82f6; }
    .btn {
      background: #3b82f6; color: #fff; border: none; border-radius: 8px;
      padding: 10px 24px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #475569; cursor: not-allowed; }

    .stats { display: flex; gap: 32px; padding: 16px 32px; background: #1e293b; border-bottom: 1px solid #334155; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: #3b82f6; }
    .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 32px; }

    .tabs { display: flex; gap: 0; margin-bottom: 20px; }
    .tab {
      padding: 10px 20px; background: #1e293b; border: 1px solid #334155;
      color: #94a3b8; cursor: pointer; font-size: 0.85rem; font-weight: 500;
    }
    .tab:first-child { border-radius: 8px 0 0 8px; }
    .tab:last-child { border-radius: 0 8px 8px 0; }
    .tab.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

    .eq-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 10px;
      padding: 20px 24px; margin-bottom: 14px;
    }
    .eq-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .eq-num { background: #3b82f6; color: #fff; font-weight: 700; font-size: 0.85rem; padding: 3px 12px; border-radius: 20px; }
    .eq-render { background: #0f172a; border-radius: 8px; padding: 14px 18px; text-align: center; overflow-x: auto; min-height: 40px; }
    .eq-symbols { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .sym-label { color: #64748b; font-size: 0.75rem; }
    .sym { background: #312e81; color: #c7d2fe; padding: 2px 10px; border-radius: 12px; font-size: 0.9rem; }

    .json-view { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 20px; overflow: auto; max-height: 70vh; }
    .json-view pre { font-size: 0.8rem; color: #a5f3fc; white-space: pre-wrap; word-break: break-all; }

    .empty { text-align: center; padding: 80px 20px; color: #64748b; }
    .empty h2 { color: #94a3b8; margin-bottom: 6px; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { background: #7f1d1d; border: 1px solid #991b1b; color: #fca5a5; padding: 12px 20px; border-radius: 8px; margin-bottom: 16px; }
  </style>
</head>
<body>

<div class="header">
  <h1>PDF Equation Extractor</h1>
  <p>Paste an arXiv URL or ID to extract all numbered math equations as LaTeX + JSON</p>
</div>

<div class="input-bar">
  <input type="text" id="url-input" placeholder="e.g. https://arxiv.org/abs/2410.07429 or just 2410.07429" />
  <button class="btn" id="extract-btn" onclick="doExtract()">Extract</button>
</div>

<div class="stats" id="stats" style="display:none">
  <div><span class="stat-value" id="s-total">0</span><br><span class="stat-label">Equations</span></div>
  <div><span class="stat-value" id="s-syms">0</span><br><span class="stat-label">Unique Symbols</span></div>
  <div><span class="stat-value" id="s-paper">-</span><br><span class="stat-label">arXiv ID</span></div>
</div>

<div class="container">
  <div id="error-box"></div>

  <div id="empty" class="empty">
    <h2>No equations yet</h2>
    <p>Paste an arXiv URL above and click Extract</p>
  </div>

  <div id="content" style="display:none">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('cards')">Equations</div>
      <div class="tab" onclick="switchTab('json')">JSON Preview</div>
    </div>
    <div id="tab-cards"></div>
    <div id="tab-json" style="display:none" class="json-view"><pre id="json-pre"></pre></div>
  </div>
</div>

<script>
  let currentData = [];

  document.getElementById('url-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doExtract();
  });

  async function doExtract() {
    const input = document.getElementById('url-input').value.trim();
    if (!input) return;

    const btn = document.getElementById('extract-btn');
    btn.disabled = true;
    btn.textContent = 'Extracting...';
    document.getElementById('error-box').textContent = '';

    try {
      const resp = await fetch('/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: input })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Extraction failed');
      showResults(data);
    } catch (err) {
      document.getElementById('error-box').textContent = '';
      const box = document.createElement('div');
      box.className = 'error';
      box.textContent = err.message;
      document.getElementById('error-box').appendChild(box);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Extract';
    }
  }

  function showResults(data) {
    currentData = data.equations;
    document.getElementById('empty').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    document.getElementById('stats').style.display = 'flex';

    const allSyms = new Set();
    currentData.forEach(eq => eq.mathsSymbol.forEach(s => allSyms.add(s)));
    document.getElementById('s-total').textContent = data.count;
    document.getElementById('s-syms').textContent = allSyms.size;
    document.getElementById('s-paper').textContent = data.arxiv_id;

    // JSON tab
    document.getElementById('json-pre').textContent = JSON.stringify(currentData, null, 2);

    // Cards tab
    const container = document.getElementById('tab-cards');
    container.textContent = '';

    currentData.forEach((eq) => {
      const card = document.createElement('div');
      card.className = 'eq-card';

      const top = document.createElement('div');
      top.className = 'eq-top';
      const num = document.createElement('span');
      num.className = 'eq-num';
      num.textContent = '(' + eq.number + ')';
      top.appendChild(num);
      card.appendChild(top);

      const render = document.createElement('div');
      render.className = 'eq-render';
      render.textContent = '$$' + eq.equation + '$$';
      card.appendChild(render);

      const syms = document.createElement('div');
      syms.className = 'eq-symbols';
      const label = document.createElement('span');
      label.className = 'sym-label';
      label.textContent = 'Symbols: ';
      syms.appendChild(label);
      if (eq.mathsSymbol.length === 0) {
        const none = document.createElement('span');
        none.style.cssText = 'color:#475569;font-size:0.8rem;';
        none.textContent = 'none';
        syms.appendChild(none);
      } else {
        eq.mathsSymbol.forEach(s => {
          const badge = document.createElement('span');
          badge.className = 'sym';
          badge.textContent = s;
          syms.appendChild(badge);
        });
      }
      card.appendChild(syms);
      container.appendChild(card);
    });

    if (window.MathJax && MathJax.typesetPromise) {
      MathJax.typesetPromise([container]).catch(err => console.warn('MathJax:', err));
    }
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (name === 'cards' && i === 0) || (name === 'json' && i === 1));
    });
    document.getElementById('tab-cards').style.display = name === 'cards' ? 'block' : 'none';
    document.getElementById('tab-json').style.display = name === 'json' ? 'block' : 'none';
  }
</script>

</body>
</html>
